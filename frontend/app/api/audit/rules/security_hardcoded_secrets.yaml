rule:
  id: "CUSTOM-SEC-001"
  name: "Hardcoded Password"
  description: "Detects hardcoded passwords in source code"
  severity: "critical"
  category: "Security"
  language: "all"
  
  pattern:
    type: "regex"
    expression: |
      (?i)(password|passwd|pwd)\s*=\s*["'][^"']{4,}["']
    
  conditions:
    file_extension: [".py", ".js", ".ts", ".java", ".go", ".rs"]
    
  false_positive_filters:
    - "test_"
    - "mock_"
    - "fixture_"
    - "example"
    - "dummy"
    - "password = \"\""
    - "password=''"
    
  remediation:
    message: "Never hardcode passwords in source code. Use environment variables or a secrets manager."
    code_example: |
      # Bad
      password = "MySecret123"
      
      # Good (Python)
      import os
      password = os.environ.get("DB_PASSWORD")
      
      # Good (JavaScript)
      const password = process.env.DB_PASSWORD;
      
  version: "1.0"
